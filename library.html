<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>The Golden Oak Library</title>
    <link rel="stylesheet" href="css/style.css">
    <link rel="stylesheet" href="css/library.css">
    <link rel="icon" type="image/x-icon" href="assets/cutiemark.svg">
    <link
        href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=Playfair+Display:ital,wght@0,600;1,600&display=swap"
        rel="stylesheet">
</head>

<body>
    <!-- my personal library! -->
    <div class="library-container">
        <!-- Back Button -->
        <a href="index.html" class="back-btn" aria-label="Go Back">
            <svg viewBox="0 0 24 24">
                <path d="M19 12H5M12 19l-7-7 7-7" />
            </svg>
        </a>

        <!-- Header -->
        <header class="library-header">
            <h1>The Golden Oak Library</h1>
            <p>A personal archive of knowledge, magic, and adventure.</p>

            <!-- Search & Filter Bar -->
            <div class="search-container">
                <input type="text" id="book-search" class="search-input"
                    placeholder="Search by title, author, or keyword...">
                <button class="search-btn">
                    <svg viewBox="0 0 24 24" width="20" height="20" stroke="currentColor" stroke-width="2" fill="none"
                        stroke-linecap="round" stroke-linejoin="round">
                        <circle cx="11" cy="11" r="8"></circle>
                        <line x1="21" y1="21" x2="16.65" y2="16.65"></line>
                    </svg>
                </button>
            </div>

            <button id="surprise-btn" class="surprise-btn">
                <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"
                    stroke-linejoin="round">
                    <polygon
                        points="12 2 15.09 8.26 22 9.27 17 14.14 18.18 21.02 12 17.77 5.82 21.02 7 14.14 2 9.27 8.91 8.26 12 2">
                    </polygon>
                </svg>
                Surprise Me!
            </button>
            <div class="search-stats" id="search-stats">Loading books...</div>
        </header>

        <!-- Dynamic Bookshelves -->
        <main class="bookshelf-area" id="bookshelf-area">
        </main>
    </div>

    <!-- Book Details Modal -->
    <div id="book-modal" class="modal-overlay">
        <div class="modal-content">
            <button id="modal-close" class="modal-close">&times;</button>
            <div class="modal-split">
                <div class="modal-left">
                    <img id="modal-cover" src="" alt="Book Cover">
                </div>
                <div class="modal-right">
                    <h2 id="modal-title">Book Title</h2>
                    <h3 id="modal-author">by Author</h3>
                    <p id="modal-desc" class="modal-desc">Book description goes here.</p>
                    <div class="modal-actions">
                        <a id="modal-read-btn" href="#" class="action-btn read-btn">Read Book</a>
                        <a id="modal-down-btn" href="#" class="action-btn down-btn" download>Download</a>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <script type="module" src="js/library.js"></script>
</body>

</html>
